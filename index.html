        <h1>Bollo Model List</h1>
        <div id="status" style="margin-bottom: 15px; padding: 15px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">

                <button id="reset-btn" style="padding: 6px 12px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;">Reset All Conversations</button>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 10px; align-items: center; font-size: 14px;">
                <label><strong>Sonnet</strong> Source:</label>
                <select id="route-sonnet" class="route-select" data-source="sonnet"></select>
                
                <label><strong>Haiku</strong> Source:</label>
                <select id="route-haiku" class="route-select" data-source="haiku"></select>
                
                <label><strong>Opus</strong> Source:</label>
                <select id="route-opus" class="route-select" data-source="opus"></select>

                <label><strong>Default</strong> Fallback:</label>
                <select id="route-default" class="route-select" data-source="default"></select>
            </div>
        </div>

    <script src="https://js.puter.com/v2/"></script>
    <script>
        // Helper: simulated progressive reveal to make the generated content "appear as it generates".
        // This provides a streaming-like UX even if the backend doesn't stream.
        let _currentReveal = null;
        function abortCurrentReveal() {
            if (_currentReveal && _currentReveal.controller) {
                _currentReveal.controller.abort();
                _currentReveal = null;
            }
        }

        function revealText(targetDiv, text, speed = 12) {
            // speed = ms per character
            abortCurrentReveal();
            const controller = new AbortController();
            _currentReveal = { controller };
            targetDiv.textContent = '';
            return new Promise((resolve) => {
                let i = 0;
                function step() {
                    if (controller.signal.aborted) {
                        resolve();
                        return;
                    }
                    // Set textContent so user-entered HTML isn't interpreted
                    targetDiv.textContent = text.slice(0, i + 1);
                    i++;
                    if (i < text.length) setTimeout(step, speed);
                    else {
                        _currentReveal = null;
                        resolve();
                    }
                }
                step();
            });
        }

        /**
         * Recursively search for and extract the most likely text content from an AI response object.
         * @param {any} obj The object to parse.
         * @returns {string|null} The extracted text or null if not found.
         */
        function extractMainText(obj) {
            if (!obj) return null;
            if (typeof obj === 'string') return obj;
            if (typeof obj !== 'object') return null;

            // Common direct properties
            if (typeof obj.text === 'string') return obj.text;
            if (typeof obj.content === 'string') return obj.content;

            // Nested structures
            if (obj.message) return extractMainText(obj.message);
            if (Array.isArray(obj.choices) && obj.choices.length > 0) return extractMainText(obj.choices[0]);
            
            // Handle content arrays (e.g., from Claude)
            if (Array.isArray(obj.content)) {
                return obj.content.map(item => extractMainText(item)).filter(Boolean).join('\n\n');
            }

            return null;
        }

        /**
         * Extracts reasoning or "thinking" steps from the AI response.
         * @param {any} obj The object to parse.
         * @returns {string|null} The extracted reasoning text or null if not found.
         */
        function extractReasoningText(obj) {
            if (!obj || typeof obj !== 'object') return null;

            // Look for a 'thinking' property, which some models might provide
            if (obj.thinking && typeof obj.thinking === 'string') {
                return obj.thinking;
            }
            
            const message = obj.message || (Array.isArray(obj.choices) && obj.choices[0] ? obj.choices[0].message : null);

            // Look for a 'reasoning' property in the message
            if (message && typeof message.reasoning === 'string') {
                return message.reasoning;
            }
            
            // Check for tool calls in the message, which often represent reasoning steps.
            if (message && Array.isArray(message.tool_calls)) {
                return message.tool_calls.map(tool_call => {
                    const args = JSON.stringify(tool_call.function.arguments, null, 2);
                    return `Tool Call: ${tool_call.function.name}\nArguments:\n${args}`;
                }).join('\n\n---\n\n');
            }

            return null;
        }

        document.getElementById('generate').addEventListener('click', async () => {
            const modelSelect = document.getElementById('model-select');
            const promptInput = document.getElementById('prompt');
            const responseDiv = document.getElementById('response');
            const loadingDiv = document.getElementById('loading');
            const extraInfoDiv = document.getElementById('extra-info');
            const reasoningContainer = document.getElementById('reasoning-container');
            const reasoningDiv = document.getElementById('reasoning');
            
            const selectedModel = modelSelect.value;
            const prompt = promptInput.value;
            
            if (!prompt) return;
            
            abortCurrentReveal();
            responseDiv.textContent = '';
            extraInfoDiv.textContent = '';
            reasoningDiv.textContent = '';
            reasoningContainer.style.display = 'none';
            loadingDiv.style.display = 'block';
            
            try {
                const response = await puter.ai.chat(prompt, { model: selectedModel });
                
                extraInfoDiv.textContent = JSON.stringify(response, null, 2);

                // Extract and display reasoning
                const reasoningText = extractReasoningText(response);
                if (reasoningText) {
                    reasoningDiv.textContent = reasoningText;
                    reasoningContainer.style.display = 'block';
                    reasoningContainer.open = true; // Expand the details view
                }

                // Extract and display the main response
                const displayText = extractMainText(response);
                if (displayText) {
                    await revealText(responseDiv, displayText);
                } else {
                    responseDiv.textContent = 'Could not find the text in the response. See the full object above.';
                }

            } catch (error) {
                console.error("AI Chat Error:", error);
                responseDiv.innerHTML = `<strong>Error:</strong><br>${error.message || 'An unknown error occurred.'}`;
                extraInfoDiv.textContent = JSON.stringify(error, Object.getOwnPropertyNames(error), 2);
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        /*
        The "Send 1 Char" test (which cycled through models sending the prompt "a")
        has been intentionally removed per request. The original but0ton and handler
        are commented out in the HTML above and the JS listener was removed.
        If you want the test restored later, uncomment the button and re-add a
        handler that iterates models and uses puter.ai.chat.

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modelSelect = document.getElementById('model-select');
            const finalModels = new Map();

            // First pass: collect all models and apply prioritization
            modelSelect.querySelectorAll('option').forEach(option => {
                const value = option.value;
                let originalText = option.textContent;
                const groupLabel = option.parentElement.label;

                // Rule 1: Skip models marked as (Free)
                if (originalText.includes('(Free)')) {
                    return;
                }

                // Rule 2: Clean up the display name
                let cleanedText = originalText
                    .replace(/\s*\([\d-]+|\d{8}\)/g, '') // Remove dates like (2024-08-06) or 20240620
                    .replace(/\s*\b(2312|2404|2407|2409|2410|2411|2501|2505|2506|2507|2508|2509)\b/g, '')
                    .replace(/^OpenRouter\s+[A-Za-z-]+\s/, '') // Remove "OpenRouter Provider " prefix
                    .replace(/[-_]/g, ' ') // Normalize separators
                    .replace(/\s{2,}/g, ' ').trim(); // Collapse spaces

                // Rule 3: De-duplicate with prioritization
                const existingModel = finalModels.get(cleanedText);
                const isNewModelOpenRouter = value.startsWith('openrouter:');

                if (!existingModel) {
                    // If it's a new model, add it
                    finalModels.set(cleanedText, { value, text: cleanedText, groupLabel });
                } else {
                    const isExistingModelOpenRouter = existingModel.value.startsWith('openrouter:');
                    // If existing is OpenRouter and new one is not, replace it
                    if (isExistingModelOpenRouter && !isNewModelOpenRouter) {
                        finalModels.set(cleanedText, { value, text: cleanedText, groupLabel });
                    }
                    // Otherwise, keep the existing one (first-come, or non-OpenRouter)
                }
            });

            // Second pass: Rebuild the dropdown from the cleaned, de-duplicated, and prioritized map
            const modelsByGroup = {};
            finalModels.forEach(model => {
                const groupLabel = model.value.startsWith('openrouter:') ? 'OpenRouter' : model.groupLabel;
                if (!modelsByGroup[groupLabel]) {
                    modelsByGroup[groupLabel] = [];
                }
                modelsByGroup[groupLabel].push(model);
            });

            modelSelect.innerHTML = ''; // Clear the entire dropdown

            Object.keys(modelsByGroup).sort().forEach(groupLabel => {
                const newOptgroup = document.createElement('optgroup');
                newOptgroup.label = groupLabel;

                // Sort models alphabetically within the group
                const sortedModels = modelsByGroup[groupLabel].sort((a, b) => a.text.localeCompare(b.text));

                sortedModels.forEach(model => {
                    const newOption = document.createElement('option');
                    newOption.value = model.value;
                    newOption.textContent = model.text;
                    newOptgroup.appendChild(newOption);
                });

                modelSelect.appendChild(newOptgroup);
            });

            // Initialize Routing UI
            const routeSelects = document.querySelectorAll('.route-select');
            
            async function refreshRoutes() {
                const res = await fetch('/get-routes');
                const routes = await res.json();
                
                routeSelects.forEach(sel => {
                    const source = sel.dataset.source;
                    sel.innerHTML = `<option value="${routes[source]}">${routes[source]}</option>`;
                });
            }

            await refreshRoutes();

            modelSelect.addEventListener('change', async () => {
                const target = modelSelect.value;
                // Update based on which route might be "focused" or just update default
                // For now, let's update whichever one is being intended. 
                // Let's add a way to choose which source to update.
            });

            routeSelects.forEach(sel => {
                sel.addEventListener('click', (e) => {
                    // When clicking a route select, we want to populate it with the full list 
                    // from the main modelSelect if it's empty or just act as the target.
                });
            });

            // Improved Model Selection: Update the focused route
            let focusedSource = 'sonnet';
            routeSelects.forEach(sel => {
                sel.addEventListener('focus', () => {
                    focusedSource = sel.dataset.source;
                    routeSelects.forEach(s => s.style.borderColor = '#ccc');
                    sel.style.borderColor = '#007bff';
                    sel.style.boxShadow = '0 0 5px rgba(0,123,255,0.5)';
                });
            });

            modelSelect.addEventListener('change', async () => {
                const target = modelSelect.value;
                try {
                    const response = await fetch('/set-route', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ source: focusedSource, target })
                    });
                    const data = await response.json();
                    if (data.success) {
                        const activeSel = document.querySelector(`.route-select[data-source="${focusedSource}"]`);
                        activeSel.innerHTML = `<option value="${target}">${target}</option>`;
                    }
                } catch (err) {
                    console.error('Failed to set route:', err);
                }
            });

            const resetBtn = document.getElementById('reset-btn');
            resetBtn.addEventListener('click', async () => {
                try {
                    const response = await fetch('/reset-chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chatId: 'all' }) // Logic to clear all in server if needed
                    });
                    const data = await response.json();
                    if (data.success) {
                        alert('All conversation histories reset successfully!');
                    }
                } catch (err) {
                    console.error('Failed to reset chat:', err);
                }
            });
        });
    </script>
